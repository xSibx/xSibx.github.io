        }

            grid-column: 1 / -1;

        async function loadUsers() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data/users.json`;
                const response = await fetch(url);
                if (response.status === 404) return null;
                const data = await response.json();
                const content = atob(data.content.replace(/\n/g, ''));
                return JSON.parse(content);
            } catch { return null; }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (users && users[username] && users[username].password === password) {
                currentUser = { username, ...users[username] };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('baseSection').style.display = 'block';
                document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name}`;
                
                // Загружаем данные
                await loadData();
                initMap();
            } else {
                document.getElementById('loginError').innerHTML = 'Неверный логин или пароль';
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('baseSection').style.display = 'none';
        }

        function checkPermission(action) {
            if (!currentUser) return false;
            if (action === 'create') return currentUser.canCreate;
            if (action === 'edit') return currentUser.canEdit;
            if (action === 'delete') return currentUser.canDelete;
            return false;
        }

        // ============================================
        // РАБОТА С ДАННЫМИ
        // ============================================
        
        async function loadData() {
            // Используем тестовые данные
            objects = testLots;
            renderLots(objects);
            updateStats();
            updateMapMarkers();
        }

        // ============================================
        // ЯНДЕКС КАРТА
        // ============================================
        
        function initMap() {
            ymaps.ready(function() {
                map = new ymaps.Map("map", {
                    center: [55.751244, 37.618423],
                    zoom: 10
                });
                
                updateMapMarkers();
            });
        }

        function updateMapMarkers() {
            if (!map) return;
            
            // Удаляем старые метки
            placemarks.forEach(p => map.geoObjects.remove(p));
            placemarks = [];
            
            // Добавляем новые метки
            objects.forEach(obj => {
                if (obj.coordinates) {
                    const placemark = new ymaps.Placemark(obj.coordinates, {
                        balloonContent: `
                            <strong>${obj.address}</strong><br>
                            ${obj.dealType}, ${obj.area} м²<br>
                            ${obj.price} ₽
                        `
                    }, {
                        preset: 'islands#blueIcon'
                    });
                    
                    placemark.events.add('click', () => {
                        // При клике на метку раскрываем соответствующий лот
                        expandLot(obj.id);
                    });
                    
                    map.geoObjects.add(placemark);
                    placemarks.push(placemark);
                }
            });
        }

        // ============================================
        // ОТОБРАЖЕНИЕ ЛОТОВ
        // ============================================
        
        let expandedLotId = null;

        function renderLots(lots) {
            const container = document.getElementById('lotsList');
            let html = '';
            
            lots.forEach(lot => {
                const isExpanded = expandedLotId === lot.id;
                const canEdit = checkPermission('edit');
                const canDelete = checkPermission('delete');
                
                html += `
                    <div class="lot-card ${isExpanded ? 'expanded' : ''}" onclick="${!isExpanded ? `expandLot(${lot.id})` : ''}">
                        <div class="lot-header">
                            <div class="lot-title">${lot.address}</div>
                            <div class="lot-price">${Number(lot.price).toLocaleString()} ₽</div>
                        </div>
                        
                        <div class="lot-badges">
                            <span class="badge ${lot.dealType === 'Продажа' ? 'sale' : 'rent'}">${lot.dealType}</span>
                            ${lot.warehouseClass !== 'Не применимо' ? 
                                `<span class="badge class-${lot.warehouseClass.toLowerCase()}">${lot.warehouseClass}</span>` : ''}
                            <span class="badge" style="background: #334155;">${lot.category}</span>
                        </div>
                        
                        <div class="lot-specs">
                            <div class="spec-item"><i class="fas fa-arrows-alt-v"></i> ${lot.height} м</div>
                            <div class="spec-item"><i class="fas fa-weight-hanging"></i> ${lot.floorLoad} кг/м²</div>
                            <div class="spec-item"><i class="fas fa-bolt"></i> ${lot.power} кВт</div>
                            <div class="spec-item"><i class="fas fa-vector-square"></i> ${lot.area} м²</div>
                        </div>
                        
                        ${isExpanded ? `
                            <div class="edit-form">
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label>Адрес</label>
                                        <input type="text" id="edit_address_${lot.id}" value="${lot.address}">
                                    </div>
                                    <div class="form-group">
                                        <label>Тип сделки</label>
                                        <select id="edit_dealType_${lot.id}">
                                            <option value="Продажа" ${lot.dealType === 'Продажа' ? 'selected' : ''}>Продажа</option>
                                            <option value="Аренда" ${lot.dealType === 'Аренда' ? 'selected' : ''}>Аренда</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Категория</label>
                                        <select id="edit_category_${lot.id}">
                                            <option value="Склад" ${lot.category === 'Склад' ? 'selected' : ''}>Склад</option>
                                            <option value="Производственный цех" ${lot.category === 'Производственный цех' ? 'selected' : ''}>Цех</option>
                                            <option value="Земельный участок" ${lot.category === 'Земельный участок' ? 'selected' : ''}>Участок</option>
                                            <option value="Ангар" ${lot.category === 'Ангар' ? 'selected' : ''}>Ангар</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Класс</label>
                                        <select id="edit_class_${lot.id}">
                                            <option value="A" ${lot.warehouseClass === 'A' ? 'selected' : ''}>A</option>
                                            <option value="B" ${lot.warehouseClass === 'B' ? 'selected' : ''}>B</option>
                                            <option value="C" ${lot.warehouseClass === 'C' ? 'selected' : ''}>C</option>
                                            <option value="Не применимо" ${lot.warehouseClass === 'Не применимо' ? 'selected' : ''}>Не применимо</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Высота (м)</label>
                                        <input type="text" id="edit_height_${lot.id}" value="${lot.height}">
                                    </div>
                                    <div class="form-group">
                                        <label>Нагрузка (кг/м²)</label>
                                        <input type="text" id="edit_load_${lot.id}" value="${lot.floorLoad}">
                                    </div>
                                    <div class="form-group">
                                        <label>Площадь (м²)</label>
                                        <input type="text" id="edit_area_${lot.id}" value="${lot.area}">
                                    </div>
                                    <div class="form-group">
                                        <label>Цена (₽)</label>
                                        <input type="text" id="edit_price_${lot.id}" value="${lot.price}">
                                    </div>
                                    <div class="form-group">
                                        <label>Электричество (кВт)</label>
                                        <input type="text" id="edit_power_${lot.id}" value="${lot.power}">
                                    </div>
                                    <div class="form-group">
                                        <label>Ворота</label>
                                        <input type="text" id="edit_gates_${lot.id}" value="${lot.gates}">
                                    </div>
                                    <div class="form-group">
                                        <label>Высота ворот (м)</label>
                                        <input type="text" id="edit_gateHeight_${lot.id}" value="${lot.gateHeight}">
                                    </div>
                                    <div class="form-group" style="grid-column: span 2;">
                                        <label>Комментарий</label>
                                        <textarea id="edit_comment_${lot.id}" rows="3">${lot.comment}</textarea>
                                    </div>
                                </div>

                                <!-- Загрузка фото -->
                                <div class="image-upload-area" onclick="document.getElementById('fileInput_${lot.id}').click()">
                                    <input type="file" id="fileInput_${lot.id}" accept="image/*" multiple style="display: none;" 
                                           onchange="handleImageUpload(event, ${lot.id})">
                                    <p><i class="fas fa-cloud-upload-alt"></i> Нажмите для загрузки фото</p>
                                </div>
                                <div id="preview_${lot.id}" class="image-preview-grid"></div>

                                <!-- Кнопки действий -->
                                <div class="lot-actions">
                                    ${canEdit ? 
                                        `<button class="btn" onclick="saveLot(${lot.id})"><i class="fas fa-save"></i> Сохранить</button>` : ''}
                                    ${canDelete ? 
                                        `<button class="btn-danger" onclick="deleteLot(${lot.id})"><i class="fas fa-trash"></i> Удалить</button>` : ''}
                                    <button class="btn-outline" onclick="generatePDF(${lot.id})">
                                        <i class="fas fa-file-pdf"></i> PDF
                                    </button>
                                    <button class="btn-outline" onclick="collapseLot()">
                                        <i class="fas fa-times"></i> Закрыть
                                    </button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function expandLot(id) {
            expandedLotId = id;
            renderLots(objects);
        }

        function collapseLot() {
            expandedLotId = null;
            renderLots(objects);
        }

        function filterLots() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            const category = document.getElementById('filterCategory').value;
            const lotClass = document.getElementById('filterClass').value;
            
            const filtered = objects.filter(obj => {
                const matchesSearch = obj.address.toLowerCase().includes(search) ||
                                     obj.comment.toLowerCase().includes(search);
                const matchesType = type === 'all' || obj.dealType === type;
                const matchesCategory = category === 'all' || obj.category === category;
                const matchesClass = lotClass === 'all' || obj.warehouseClass === lotClass;
                return matchesSearch && matchesType && matchesCategory && matchesClass;
            });
            
            renderLots(filtered);
            updateMapMarkers(filtered);
        }

        function updateStats() {
            document.getElementById('totalCount').innerText = objects.length;
            const totalArea = objects.reduce((acc, o) => acc + (parseFloat(o.area) || 0), 0);
            document.getElementById('totalArea').innerText = Math.round(totalArea);
            
            const heights = objects.map(o => parseFloat(o.height)).filter(h => !isNaN(h));
            const avgHeight = heights.length ? (heights.reduce((a,b) => a+b, 0) / heights.length).toFixed(1) : 0;
            document.getElementById('avgHeight').innerText = avgHeight;
            
            const powers = objects.map(o => parseFloat(o.power)).filter(p => !isNaN(p));
            const avgPower = powers.length ? Math.round(powers.reduce((a,b) => a+b, 0) / powers.length) : 0;
            document.getElementById('avgPower').innerText = avgPower;
        }

        function createNewLot() {
            if (!checkPermission('create')) {
                alert('У вас нет прав на создание объектов');
                return;
            }
            
            const newLot = {
                id: Date.now(),
                address: "Новый объект",
                dealType: "Аренда",
                category: "Склад",
                warehouseClass: "A",
                height: "0",
                floorLoad: "0",
                floorType: "Бетон",
                area: "0",
                price: "0",
                power: "0",
                gates: "",
                gateHeight: "0",
                railway: "Нет",
                heating: "Нет",
                yearBuilt: "2024",
                security: "Нет",
                ownerName: "",
                ownerPhone: "",
                ownerEmail: "",
                ownerExtra: "",
                images: [],
                comment: "",
                coordinates: [55.751244, 37.618423]
            };
            
            objects.push(newLot);
            renderLots(objects);
            updateStats();
            expandLot(newLot.id);
        }

        function saveLot(id) {
            if (!checkPermission('edit')) {
                alert('У вас нет прав на редактирование');
                return;
            }
            
            const lot = objects.find(o => o.id === id);
            if (!lot) return;
            
            lot.address = document.getElementById(`edit_address_${id}`).value;
            lot.dealType = document.getElementById(`edit_dealType_${id}`).value;
            lot.category = document.getElementById(`edit_category_${id}`).value;
            lot.warehouseClass = document.getElementById(`edit_class_${id}`).value;
            lot.height = document.getElementById(`edit_height_${id}`).value;
            lot.floorLoad = document.getElementById(`edit_load_${id}`).value;
            lot.area = document.getElementById(`edit_area_${id}`).value;
            lot.price = document.getElementById(`edit_price_${id}`).value;
            lot.power = document.getElementById(`edit_power_${id}`).value;
            lot.gates = document.getElementById(`edit_gates_${id}`).value;
            lot.gateHeight = document.getElementById(`edit_gateHeight_${id}`).value;
            lot.comment = document.getElementById(`edit_comment_${id}`).value;
            
            renderLots(objects);
            updateStats();
            updateMapMarkers();
            collapseLot();
        }

        function deleteLot(id) {
            if (!checkPermission('delete')) {
                alert('У вас нет прав на удаление');
                return;
            }
            
            if (confirm('Удалить объект?')) {
                objects = objects.filter(o => o.id !== id);
                renderLots(objects);
                updateStats();
                updateMapMarkers();
                if (expandedLotId === id) collapseLot();
            }
        }

        function handleImageUpload(event, lotId) {
            const files = event.target.files;
            const previewDiv = document.getElementById(`preview_${lotId}`);
            
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    
                    const previewItem = document.createElement('div');
                    previewItem.className = 'image-preview-item';
                    previewItem.appendChild(img);
                    
                    const delBtn = document.createElement('button');
                    delBtn.innerHTML = '×';
                    delBtn.onclick = function() {
                        previewItem.remove();
                    };
                    previewItem.appendChild(delBtn);
                    
                    previewDiv.appendChild(previewItem);
                };
                reader.readAsDataURL(files[i]);
            }
        }

        async function generatePDF(id) {
            const lot = objects.find(o => o.id === id);
            if (!lot) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            let yPos = 20;
            
            doc.setFontSize(20);
            doc.setTextColor(59, 130, 246);
            doc.text('ПРЕЗЕНТАЦИЯ ОБЪЕКТА', 105, yPos, { align: 'center' });
            yPos += 15;
            
            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text(`Адрес: ${lot.address}`, 20, yPos);
            yPos += 10;
            
            doc.setFontSize(12);
            doc.text(`Тип сделки: ${lot.dealType}`, 20, yPos);
            doc.text(`Категория: ${lot.category}`, 120, yPos);
            yPos += 8;
            
            doc.text(`Класс: ${lot.warehouseClass}`, 20, yPos);
            doc.text(`Площадь: ${lot.area} м²`, 120, yPos);
            yPos += 8;
            
            doc.text(`Высота потолков: ${lot.height} м`, 20, yPos);
            doc.text(`Нагрузка на пол: ${lot.floorLoad} кг/м²`, 120, yPos);
            yPos += 8;
            
            doc.text(`Покрытие пола: ${lot.floorType}`, 20, yPos);
            doc.text(`Электричество: ${lot.power} кВт`, 120, yPos);
            yPos += 8;
            
            doc.text(`Ворота: ${lot.gates} / высота ${lot.gateHeight} м`, 20, yPos);
            yPos += 8;
            
            doc.text(`Ж/д ветка: ${lot.railway}`, 20, yPos);
            doc.text(`Отопление: ${lot.heating}`, 120, yPos);
            yPos += 8;
            
            doc.text(`Год постройки: ${lot.yearBuilt}`, 20, yPos);
            doc.text(`Охрана: ${lot.security}`, 120, yPos);
            yPos += 15;
            
            doc.setFontSize(16);
            doc.setTextColor(34, 197, 94);
            doc.text(`Цена: ${Number(lot.price).toLocaleString()} ₽`, 20, yPos);
            yPos += 15;
            
            doc.setFontSize(12);
            doc.text('Описание:', 20, yPos);
            yPos += 6;
            
            const commentLines = doc.splitTextToSize(lot.comment, 170);
            doc.text(commentLines, 20, yPos);
            
            doc.save(`object_${lot.address.substring(0, 20)}.pdf`);
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        
        (async function() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('baseSection').style.display = 'block';
                document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name}`;
                
                await loadData();
                initMap();
            } else {
                document.getElementById('loginSection').style.display = 'block';
            }
            
            // Показываем/скрываем кнопку создания
            document.getElementById('createBtn').style.display = 
                checkPermission('create') ? 'inline-block' : 'none';
        })();
    </script>
</body>
</html>
