        .user-info {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 40px;
            border: 1px solid #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .user-info button {
            background: #ef4444;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .user-info button:hover { background: #dc2626; }
        .user-info a {
            color: #3b82f6;
            text-decoration: none;
            margin-left: 5px;
        }
        
        /* Карта на полэкрана */
        #map-container {
            width: 100%;
            height: 50vh;
            position: relative;
            border-bottom: 2px solid #334155;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* Фильтры между картой и поиском */
        .filters-bar {
            background: #1e293b;
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            padding: 5px 15px;
            border-radius: 40px;
            border: 1px solid #334155;
        }
        
        .filter-group label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .filter-group select {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 5px;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
        }
        
        .filter-group select option {
            background: #1e293b;
        }
        
        .price-range {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .price-range input {
            width: 100px;
            padding: 8px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 40px;
            color: white;
        }
        
        /* Основной контент */
        .content {
            padding: 20px;
        }
        
        /* Поиск по адресу */
        .search-section {
            background: #1e293b;
            border-radius: 60px;
            padding: 6px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .search-section input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 60px;
            font-size: 0.95rem;
            background: #0f172a;
            color: white;
        }
        
        /* Список объектов */
        .objects-list {
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        
        .object-item {
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .object-item:hover {
            background: #2d3a4a;
        }
        
        .object-item.expanded {
            background: #0f172a;
            cursor: default;
        }
        
        .object-main {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 2;
            min-width: 300px;
        }
        
        .object-badges {
            display: flex;
            gap: 5px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge.sale { background: #1e3a5f; color: #90caf9; }
        .badge.rent { background: #1e3a3a; color: #81c784; }
        .badge.class-a { background: #4a3b1e; color: #ffb74d; }
        .badge.class-b { background: #3a2e1e; color: #ffa726; }
        .badge.class-c { background: #3a2a1e; color: #ff9800; }
        
        .object-address {
            font-weight: 600;
            color: white;
        }
        
        .object-price {
            font-weight: 700;
            color: #10b981;
            font-size: 1.1rem;
        }
        
        .object-specs {
            display: flex;
            gap: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .spec-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .spec-item i {
            color: #3b82f6;
            width: 16px;
        }

            padding: 20px;
            background: #1e293b;
            border-radius: 16px;
            display: none;
        }
        
        .object-item.expanded .edit-form {

        }
        
        .form-grid {

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;

        .form-group {

            flex-direction: column;

            border-radius: 12px;
            color: white;

            padding: 15px;
            text-align: center;
            background: #0f172a;
            cursor: pointer;
            margin: 15px 0;

        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        
        .image-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

            top: 2px;
            right: 2px;

            color: white;
            border: none;
            border-radius: 50%;

            height: 18px;
            font-size: 10px;
            cursor: pointer;

            border: none;

                <div id="loginError" class="error"></div>
                <div style="margin-top: 20px;">

        </div>

                </div>
            </div>

            <!-- Карта на полэкрана -->
            <div id="map-container">
                <div id="map"></div>
            </div>

            <!-- Фильтры между картой и поиском -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label>Тип сделки</label>
                    <select id="filterType" onchange="filterLots()">
                        <option value="all">Все</option>
                        <option value="Продажа">Продажа</option>
                        <option value="Аренда">Аренда</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Категория</label>
                    <select id="filterCategory" onchange="filterLots()">
                        <option value="all">Все</option>
                        <option value="Склад">Склад</option>
                        <option value="Производственный цех">Цех</option>
                        <option value="Земельный участок">Участок</option>
                        <option value="Ангар">Ангар</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Класс</label>
                    <select id="filterClass" onchange="filterLots()">
                        <option value="all">Все</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Мин. цена</label>
                    <input type="number" id="minPrice" placeholder="от" onchange="filterLots()" style="width: 100px;">
                </div>
                
                <div class="filter-group">
                    <label>Макс. цена</label>
                    <input type="number" id="maxPrice" placeholder="до" onchange="filterLots()" style="width: 100px;">
                </div>
                
                <div class="filter-group">
                    <label>Мин. площадь</label>
                    <input type="number" id="minArea" placeholder="от" onchange="filterLots()" style="width: 100px;">
                </div>
                
                <button class="btn" onclick="resetFilters()" style="margin-left: auto;">
                    <i class="fas fa-undo"></i> Сброс
                </button>
            </div>

            <!-- Основной контент (главная страница со списком) -->
            <div id="mainContent">
                <!-- Поиск по адресу -->
                <div class="content">
                    <div class="search-section">
                        <input type="text" id="searchInput" placeholder="🔍 Поиск по адресу, описанию..." onkeyup="filterLots()">
                        <button class="btn" onclick="createNewLot()" id="createBtn">
                            <i class="fas fa-plus"></i> Новый объект
                        </button>
                    </div>

                    <!-- Список объектов -->
                    <div class="objects-list" id="objectsList"></div>
                </div>
            </div>

            <div id="lotDetailPage" style="display: none;">
                <div class="content">
                    <div class="back-button" onclick="showMainPage()">

                    </div>
                    <div id="lotDetailContent" class="lot-detail-page"></div>
                </div>
            </div>

                category: "Склад",
                warehouseClass: "A",
                height: "12.0",
                floorLoad: "6000",
                floorType: "Полимерный",
                area: "3000",
                price: "2200000",
                power: "500",
                gates: "Доковые",
                gateHeight: "5.0",
                railway: "Есть",
                heating: "Центральное",
                yearBuilt: "2015",
                security: "Круглосуточная",
                ownerName: "ООО Верейский склад",
                ownerPhone: "+7 (495) 111-22-33",
                ownerEmail: "sklad@verey.ru",
                ownerExtra: "Алексей",
                images: [],
                comment: "Отличный склад, все коммуникации",
                coordinates: [55.691244, 37.498423]
            }
        ];

        // ============================================
        // ФУНКЦИИ ДЛЯ КАРТЫ
        // ============================================
        
        function initMap() {
            ymaps.ready(function() {
                map = new ymaps.Map("map", {
                    center: [55.751244, 37.618423],
                    zoom: 10
                });
                updateMapMarkers();
            });
        }

        function updateMapMarkers() {
            if (!map) return;
            
            placemarks.forEach(p => map.geoObjects.remove(p));
            placemarks = [];
            
            objects.forEach(obj => {
                if (obj.coordinates) {
                    const placemark = new ymaps.Placemark(obj.coordinates, {
                        balloonContent: `
                            <strong>${obj.address}</strong><br>
                            ${obj.dealType}, ${obj.area} м²<br>
                            ${Number(obj.price).toLocaleString()} ₽
                        `
                    }, {
                        preset: 'islands#blueIcon'
                    });
                    
                    placemark.events.add('click', () => {
                        showLotDetail(obj.id);
                    });
                    
                    map.geoObjects.add(placemark);
                    placemarks.push(placemark);
                }
            });
        }

        // ============================================
        // НАВИГАЦИЯ МЕЖДУ СТРАНИЦАМИ
        // ============================================
        
        function showMainPage() {
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('lotDetailPage').style.display = 'none';
            currentLotId = null;
        }
        
        function showLotDetail(lotId) {
            const lot = objects.find(o => o.id === lotId);
            if (!lot) return;
            
            currentLotId = lotId;
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('lotDetailPage').style.display = 'block';
            
            renderLotDetail(lot);
        }
        
        function renderLotDetail(lot) {
            const container = document.getElementById('lotDetailContent');
            const canEdit = checkPermission('edit');
            const canDelete = checkPermission('delete');
            
            let imagesHtml = '';
            if (lot.images && lot.images.length > 0) {
                imagesHtml = '<div class="image-preview-grid">';
                lot.images.forEach(img => {
                    imagesHtml += `
                        <div class="image-preview-item">
                            <img src="${img.data}" alt="photo">
                        </div>
                    `;
                });
                imagesHtml += '</div>';
            }
            
            container.innerHTML = `
                <h2 style="color: white; margin-bottom: 20px;">${lot.address}</h2>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Адрес</label>
                        <input type="text" id="detail_address" value="${lot.address}">
                    </div>
                    <div class="form-group">
                        <label>Тип сделки</label>
                        <select id="detail_dealType">
                            <option value="Продажа" ${lot.dealType === 'Продажа' ? 'selected' : ''}>Продажа</option>
                            <option value="Аренда" ${lot.dealType === 'Аренда' ? 'selected' : ''}>Аренда</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <select id="detail_category">
                            <option value="Склад" ${lot.category === 'Склад' ? 'selected' : ''}>Склад</option>
                            <option value="Производственный цех" ${lot.category === 'Производственный цех' ? 'selected' : ''}>Цех</option>
                            <option value="Земельный участок" ${lot.category === 'Земельный участок' ? 'selected' : ''}>Участок</option>
                            <option value="Ангар" ${lot.category === 'Ангар' ? 'selected' : ''}>Ангар</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Класс</label>
                        <select id="detail_class">
                            <option value="A" ${lot.warehouseClass === 'A' ? 'selected' : ''}>A</option>
                            <option value="B" ${lot.warehouseClass === 'B' ? 'selected' : ''}>B</option>
                            <option value="C" ${lot.warehouseClass === 'C' ? 'selected' : ''}>C</option>
                            <option value="Не применимо" ${lot.warehouseClass === 'Не применимо' ? 'selected' : ''}>Не применимо</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Высота (м)</label>
                        <input type="text" id="detail_height" value="${lot.height}">
                    </div>
                    <div class="form-group">
                        <label>Нагрузка (кг/м²)</label>
                        <input type="text" id="detail_load" value="${lot.floorLoad}">
                    </div>
                    <div class="form-group">
                        <label>Площадь (м²)</label>
                        <input type="text" id="detail_area" value="${lot.area}">
                    </div>
                    <div class="form-group">
                        <label>Цена (₽)</label>
                        <input type="text" id="detail_price" value="${lot.price}">
                    </div>
                    <div class="form-group">
                        <label>Электричество (кВт)</label>
                        <input type="text" id="detail_power" value="${lot.power}">
                    </div>
                    <div class="form-group">
                        <label>Ворота</label>
                        <input type="text" id="detail_gates" value="${lot.gates}">
                    </div>
                    <div class="form-group">
                        <label>Высота ворот (м)</label>
                        <input type="text" id="detail_gateHeight" value="${lot.gateHeight}">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Комментарий</label>
                        <textarea id="detail_comment" rows="3">${lot.comment}</textarea>
                    </div>
                </div>
                
                <div class="image-upload-area" onclick="document.getElementById('detail_fileInput').click()">
                    <input type="file" id="detail_fileInput" accept="image/*" multiple style="display: none;" 
                           onchange="handleDetailImageUpload(event)">
                    <p><i class="fas fa-cloud-upload-alt"></i> Добавить фото</p>
                </div>
                <div id="detail_preview" class="image-preview-grid">${imagesHtml}</div>
                
                <div class="lot-actions">
                    ${canEdit ? 
                        `<button class="btn" onclick="saveLotDetail(${lot.id})"><i class="fas fa-save"></i> Сохранить</button>` : ''}
                    ${canDelete ? 
                        `<button class="btn-danger" onclick="deleteLot(${lot.id})"><i class="fas fa-trash"></i> Удалить</button>` : ''}
                    <button class="btn-outline" onclick="generatePDF(${lot.id})">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                </div>
            `;
        }

        // ============================================
        // АВТОРИЗАЦИЯ
        // ============================================
        
        async function loadUsers() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data/users.json`;
                const response = await fetch(url);
                if (response.status === 404) return null;
                const data = await response.json();
                const content = atob(data.content.replace(/\n/g, ''));
                return JSON.parse(content);
            } catch { return null; }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const users = await loadUsers();
            
            if (users && users[username] && users[username].password === password) {
                currentUser = { username, ...users[username] };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('baseSection').style.display = 'block';
                document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name}`;
                
                await loadData();
                initMap();
            } else {
                document.getElementById('loginError').innerHTML = 'Неверный логин или пароль';
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('baseSection').style.display = 'none';
        }

        function checkPermission(action) {
            if (!currentUser) return false;
            if (action === 'create') return currentUser.canCreate;
            if (action === 'edit') return currentUser.canEdit;
            if (action === 'delete') return currentUser.canDelete;
            return false;
        }

        // ============================================
        // РАБОТА С ДАННЫМИ
        // ============================================
        
        async function loadData() {
            objects = testLots;
            renderObjects(objects);
        }

        // ============================================
        // ФИЛЬТРАЦИЯ
        // ============================================
        
        function filterLots() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            const category = document.getElementById('filterCategory').value;
            const lotClass = document.getElementById('filterClass').value;
            const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
            const minArea = parseFloat(document.getElementById('minArea').value) || 0;
            
            const filtered = objects.filter(obj => {
                const matchesSearch = obj.address.toLowerCase().includes(search) ||
                                     obj.comment.toLowerCase().includes(search);
                const matchesType = type === 'all' || obj.dealType === type;
                const matchesCategory = category === 'all' || obj.category === category;
                const matchesClass = lotClass === 'all' || obj.warehouseClass === lotClass;
                const matchesPrice = parseFloat(obj.price) >= minPrice && parseFloat(obj.price) <= maxPrice;
                const matchesArea = parseFloat(obj.area) >= minArea;
                
                return matchesSearch && matchesType && matchesCategory && matchesClass && matchesPrice && matchesArea;
            });
            
            renderObjects(filtered);
            updateMapMarkers();
        }
        
        function resetFilters() {
            document.getElementById('filterType').value = 'all';
            document.getElementById('filterCategory').value = 'all';
            document.getElementById('filterClass').value = 'all';
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            document.getElementById('minArea').value = '';
            document.getElementById('searchInput').value = '';
            filterLots();
        }

        // ============================================
        // ОТОБРАЖЕНИЕ ОБЪЕКТОВ
        // ============================================
        
        function renderObjects(lots) {
            const container = document.getElementById('objectsList');
            let html = '';
            
            lots.forEach(lot => {
                html += `
                    <div class="object-item" onclick="showLotDetail(${lot.id})">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; width: 100%;">
                            <div class="object-main">
                                <div class="object-badges">
                                    <span class="badge ${lot.dealType === 'Продажа' ? 'sale' : 'rent'}">${lot.dealType}</span>
                                    ${lot.warehouseClass !== 'Не применимо' ? 
                                        `<span class="badge class-${lot.warehouseClass.toLowerCase()}">${lot.warehouseClass}</span>` : ''}
                                </div>
                                <div class="object-address">${lot.address}</div>
                                <div class="object-price">${Number(lot.price).toLocaleString()} ₽</div>
                            </div>
                            
                            <div class="object-specs">
                                <div class="spec-item"><i class="fas fa-arrows-alt-v"></i> ${lot.height} м</div>
                                <div class="spec-item"><i class="fas fa-weight-hanging"></i> ${lot.floorLoad} кг/м²</div>
                                <div class="spec-item"><i class="fas fa-bolt"></i> ${lot.power} кВт</div>
                                <div class="spec-item"><i class="fas fa-vector-square"></i> ${lot.area} м²</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function createNewLot() {
            if (!checkPermission('create')) {
                alert('У вас нет прав на создание объектов');
                return;
            }
            
            const newLot = {
                id: Date.now(),
                address: "Новый объект",
                dealType: "Аренда",
                category: "Склад",
                warehouseClass: "A",
                height: "0",
                floorLoad: "0",
                floorType: "Бетон",
                area: "0",
                price: "0",
                power: "0",
                gates: "",
                gateHeight: "0",
                railway: "Нет",
                heating: "Нет",
                yearBuilt: "2024",
                security: "Нет",
                ownerName: "",
                ownerPhone: "",
                ownerEmail: "",
                ownerExtra: "",
                images: [],
                comment: "",
                coordinates: [55.751244, 37.618423]
            };
            
            objects.push(newLot);
            renderObjects(objects);
            updateMapMarkers();
            showLotDetail(newLot.id);
        }

        function saveLotDetail(id) {
            if (!checkPermission('edit')) {
                alert('У вас нет прав на редактирование');
                return;
            }
            
            const lot = objects.find(o => o.id === id);
            if (!lot) return;
            
            lot.address = document.getElementById('detail_address').value;
            lot.dealType = document.getElementById('detail_dealType').value;
            lot.category = document.getElementById('detail_category').value;
            lot.warehouseClass = document.getElementById('detail_class').value;
            lot.height = document.getElementById('detail_height').value;
            lot.floorLoad = document.getElementById('detail_load').value;
            lot.area = document.getElementById('detail_area').value;
            lot.price = document.getElementById('detail_price').value;
            lot.power = document.getElementById('detail_power').value;
            lot.gates = document.getElementById('detail_gates').value;
            lot.gateHeight = document.getElementById('detail_gateHeight').value;
            lot.comment = document.getElementById('detail_comment').value;
            
            renderObjects(objects);
            updateMapMarkers();
            showMainPage();
        }

        function deleteLot(id) {
            if (!checkPermission('delete')) {
                alert('У вас нет прав на удаление');
                return;
            }
            
            if (confirm('Удалить объект?')) {
                objects = objects.filter(o => o.id !== id);
                renderObjects(objects);
                updateMapMarkers();
                showMainPage();
            }
        }

        function handleDetailImageUpload(event) {
            const files = event.target.files;
            const previewDiv = document.getElementById('detail_preview');
            
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    
                    const previewItem = document.createElement('div');
                    previewItem.className = 'image-preview-item';
                    previewItem.appendChild(img);
                    
                    const delBtn = document.createElement('button');
                    delBtn.innerHTML = '×';
                    delBtn.onclick = function() {
                        previewItem.remove();
                    };
                    previewItem.appendChild(delBtn);
                    
                    previewDiv.appendChild(previewItem);
                };
                reader.readAsDataURL(files[i]);
            }
        }

        async function generatePDF(id) {
            const lot = objects.find(o => o.id === id);
            if (!lot) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            let yPos = 20;
            
            doc.setFontSize(20);
            doc.setTextColor(59, 130, 246);
            doc.text('ПРЕЗЕНТАЦИЯ ОБЪЕКТА', 105, yPos, { align: 'center' });
            yPos += 15;
            
            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text(`Адрес: ${lot.address}`, 20, yPos);
            yPos += 10;
            
            doc.setFontSize(12);
            doc.text(`Тип сделки: ${lot.dealType}`, 20, yPos);
            doc.text(`Категория: ${lot.category}`, 120, yPos);
            yPos += 8;
            
            doc.text(`Класс: ${lot.warehouseClass}`, 20, yPos);
            doc.text(`Площадь: ${lot.area} м²`, 120, yPos);
            yPos += 8;
            
            doc.text(`Высота потолков: ${lot.height} м`, 20, yPos);
            doc.text(`Нагрузка на пол: ${lot.floorLoad} кг/м²`, 120, yPos);
            yPos += 8;
            
            doc.text(`Покрытие пола: ${lot.floorType}`, 20, yPos);
            doc.text(`Электричество: ${lot.power} кВт`, 120, yPos);
            yPos += 8;
            
            doc.text(`Ворота: ${lot.gates} / высота ${lot.gateHeight} м`, 20, yPos);
            yPos += 8;
            
            doc.text(`Ж/д ветка: ${lot.railway}`, 20, yPos);
            doc.text(`Отопление: ${lot.heating}`, 120, yPos);
            yPos += 8;
            
            doc.text(`Год постройки: ${lot.yearBuilt}`, 20, yPos);
            doc.text(`Охрана: ${lot.security}`, 120, yPos);
            yPos += 15;
            
            doc.setFontSize(16);
            doc.setTextColor(34, 197, 94);
            doc.text(`Цена: ${Number(lot.price).toLocaleString()} ₽`, 20, yPos);
            yPos += 15;
            
            doc.setFontSize(12);
            doc.text('Описание:', 20, yPos);
            yPos += 6;
            
            const commentLines = doc.splitTextToSize(lot.comment, 170);
            doc.text(commentLines, 20, yPos);
            
            doc.save(`object_${lot.address.substring(0, 20)}.pdf`);
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        
        (async function() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('baseSection').style.display = 'block';
                document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name}`;
                
                await loadData();
                initMap();
            } else {
                document.getElementById('loginSection').style.display = 'block';
            }
            
            document.getElementById('createBtn').style.display = 
                checkPermission('create') ? 'inline-block' : 'none';
        })();
    </script>
</body>
</html>
