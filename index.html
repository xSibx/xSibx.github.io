<div id="authCheck" style="position: fixed; top: 10px; right: 10px; z-index: 1000;">
    <span id="userStatus"></span>
    <button onclick="logout()" style="display: none;" id="logoutBtn">Выйти</button>
</div>

<script>
    // Система авторизации для основного сайта
    const AUTH_USERS_URL = 'https://api.github.com/repos/xsibx/xsibx.github.io/contents/data/users.json';
    let currentUser = null;

    async function checkAuth() {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('userStatus').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name} (${currentUser.role})`;
            document.getElementById('logoutBtn').style.display = 'inline';
            applyPermissions();
        } else {
            // Перенаправляем на страницу входа
            window.location.href = '/admin/';
        }
    }

    function applyPermissions() {
        if (!currentUser) return;
        
        // Скрываем кнопки, если нет прав
        if (!currentUser.canCreate) {
            // Можно скрыть форму добавления
        }
        if (!currentUser.canEdit) {
            // Скрыть кнопки редактирования
        }
        if (!currentUser.canDelete) {
            // Скрыть кнопки удаления
        }
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = '/admin/';
    }

    checkAuth();
</script>
