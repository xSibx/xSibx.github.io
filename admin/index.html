<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Управление пользователями</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: #0b1120; margin: 0; padding: 20px; color: #e2e8f0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        
        h1 { color: #fff; margin-bottom: 30px; }
        h1 span { color: #3b82f6; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #334155;
            border-radius: 14px;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 0.95rem;
        }
        
        input:focus, select:focus {
            border-color: #3b82f6;
            outline: none;
        }
        
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            margin-right: 10px;
        }
        
        .btn:hover { background: #2563eb; }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #f1f5f9;
        }
        .btn-outline:hover { background: rgba(59,130,246,0.1); }
        
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th {
            background: #0f172a;
            color: #94a3b8;
            padding: 16px 12px;
            text-align: left;
            border-bottom: 2px solid #334155;
        }
        
        td {
            padding: 16px 12px;
            border-bottom: 1px solid #334155;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .badge.admin { background: #4a3b1e; color: #ffb74d; }
        .badge.manager { background: #1e3a5f; color: #90caf9; }
        .badge.viewer { background: #1e3a3a; color: #81c784; }
        
        .login-form {
            max-width: 400px;
            margin: 50px auto;
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        
        .user-info {
            background: #0f172a;
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }
        
        .error { color: #ef4444; margin-top: 10px; }
        .success { color: #10b981; margin-top: 10px; }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            background: #334155;
            border: none;
            color: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        
        .action-btn:hover { background: #3b82f6; }
        .action-btn.delete:hover { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Форма входа -->
        <div id="loginForm" class="card login-form">
            <h2><i class="fas fa-lock"></i> Вход в админ-панель</h2>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="loginUsername" placeholder="admin">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn" onclick="login()"><i class="fas fa-sign-in-alt"></i> Войти</button>
            <div id="loginError" class="error"></div>
        </div>

        <!-- Админ-панель -->
        <div id="adminPanel" style="display: none;">
            <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="fas fa-users-cog"></i> Управление пользователями</h2>
                <div class="user-info">
                    <span id="currentUserDisplay"></span>
                    <button class="btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
            </div>

            <!-- Форма добавления/редактирования пользователя -->
            <div class="card">
                <h3><i class="fas fa-user-plus"></i> Добавить/редактировать пользователя</h3>
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="newUsername" placeholder="user123">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="text" id="newPassword" placeholder="пароль">
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="newName" placeholder="Иван Петров">
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="newRole">
                        <option value="viewer">Наблюдатель</option>
                        <option value="manager">Менеджер</option>
                        <option value="admin">Администратор</option>
                    </select>
                </div>
                
                <h4>Права доступа</h4>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="permCreate" checked> <label>Создание объектов</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="permEdit" checked> <label>Редактирование</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="permDelete" checked> <label>Удаление</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="permManageUsers"> <label>Управление пользователями</label>
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn" onclick="addUser()" id="saveBtn"><i class="fas fa-save"></i> Добавить пользователя</button>
                </div>
                <div id="formMessage" class="success" style="display: none;"></div>
            </div>

            <!-- Список пользователей -->
            <div class="card">
                <h3><i class="fas fa-list"></i> Список пользователей</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Логин</th>
                            <th>Имя</th>
                            <th>Роль</th>
                            <th>Права</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // КОНФИГУРАЦИЯ
        // ============================================
        const GITHUB_OWNER = 'xsibx';
        const GITHUB_REPO = 'xsibx.github.io';
        const GITHUB_USERS_PATH = 'data/users.json';
        let githubToken = localStorage.getItem('github_token') || '';
        let currentUser = null;

        // ============================================
        // ФУНКЦИИ ДЛЯ РАБОТЫ С КОДИРОВКОЙ
        // ============================================
        
        function decodeBase64(base64) {
            const binaryString = atob(base64.replace(/\n/g, ''));
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        function encodeToBase64(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            let binary = '';
            for (let i = 0; i < data.length; i++) {
                binary += String.fromCharCode(data[i]);
            }
            return btoa(binary);
        }

        // ============================================
        // ЗАГРУЗКА И СОХРАНЕНИЕ ПОЛЬЗОВАТЕЛЕЙ
        // ============================================
        
        async function loadUsers() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_USERS_PATH}`;
                const response = await fetch(url);
                
                if (response.status === 404) {
                    const defaultUsers = {
                        admin: {
                            password: "admin123",
                            role: "admin",
                            name: "Главный администратор",
                            canCreate: true,
                            canEdit: true,
                            canDelete: true,
                            canManageUsers: true
                        },
                        manager: {
                            password: "manager123",
                            role: "manager",
                            name: "Менеджер",
                            canCreate: true,
                            canEdit: true,
                            canDelete: false,
                            canManageUsers: false
                        },
                        viewer: {
                            password: "viewer123",
                            role: "viewer",
                            name: "Наблюдатель",
                            canCreate: false,
                            canEdit: false,
                            canDelete: false,
                            canManageUsers: false
                        }
                    };
                    
                    await saveUsers(defaultUsers);
                    return defaultUsers;
                }
                
                const data = await response.json();
                const jsonString = decodeBase64(data.content);
                return JSON.parse(jsonString);
            } catch (error) {
                console.error('Ошибка загрузки пользователей:', error);
                return null;
            }
        }

        async function saveUsers(users) {
            if (!githubToken) {
                alert('Сначала введите GitHub токен');
                return false;
            }

            try {
                const jsonString = JSON.stringify(users, null, 2);
                const content = encodeToBase64(jsonString);
                
                const getUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_USERS_PATH}`;
                const getResponse = await fetch(getUrl);
                
                let sha = null;
                if (getResponse.status !== 404) {
                    const existingData = await getResponse.json();
                    sha = existingData.sha;
                }

                const putUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_USERS_PATH}`;
                const putResponse = await fetch(putUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: 'Обновление пользователей',
                        content: content,
                        sha: sha
                    })
                });

                return putResponse.ok;
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                return false;
            }
        }

        // ============================================
        // АВТОРИЗАЦИЯ
        // ============================================
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            const users = await loadUsers();
            
            if (users && users[username] && users[username].password === password) {
                currentUser = {
                    username: username,
                    ...users[username]
                };
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('currentUserDisplay').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name} (${currentUser.role})`;
                
                renderUsersTable(users);
            } else {
                document.getElementById('loginError').innerHTML = '❌ Неверный логин или пароль';
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').innerHTML = '';
            resetForm();
        }

        // ============================================
        // УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ
        // ============================================
        
        let editingUsername = null;

        async function addUser() {
            if (editingUsername) {
                alert('Сначала завершите редактирование или нажмите Отмена');
                return;
            }
            
            if (!currentUser || !currentUser.canManageUsers) {
                alert('У вас нет прав на управление пользователями');
                return;
            }

            const username = document.getElementById('newUsername').value.trim();
            if (!username) {
                alert('Введите логин');
                return;
            }

            const users = await loadUsers();
            
            if (users[username]) {
                alert('Пользователь с таким логином уже существует');
                return;
            }

            users[username] = {
                password: document.getElementById('newPassword').value || 'password',
                role: document.getElementById('newRole').value,
                name: document.getElementById('newName').value || username,
                canCreate: document.getElementById('permCreate').checked,
                canEdit: document.getElementById('permEdit').checked,
                canDelete: document.getElementById('permDelete').checked,
                canManageUsers: document.getElementById('permManageUsers').checked
            };

            const saved = await saveUsers(users);
            if (saved) {
                showMessage('✅ Пользователь добавлен');
                renderUsersTable(users);
                resetForm();
            } else {
                alert('❌ Ошибка сохранения');
            }
        }

        async function editUser(username) {
            const users = await loadUsers();
            const user = users[username];
            
            if (!user) return;
            
            editingUsername = username;
            
            document.getElementById('newUsername').value = username;
            document.getElementById('newPassword').value = user.password;
            document.getElementById('newName').value = user.name || username;
            document.getElementById('newRole').value = user.role;
            
            document.getElementById('permCreate').checked = user.canCreate || false;
            document.getElementById('permEdit').checked = user.canEdit || false;
            document.getElementById('permDelete').checked = user.canDelete || false;
            document.getElementById('permManageUsers').checked = user.canManageUsers || false;
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Обновить пользователя';
            saveBtn.onclick = updateUser;
            
            // Добавляем кнопку отмены, если её нет
            if (!document.getElementById('cancelBtn')) {
                const cancelBtn = document.createElement('button');
                cancelBtn.id = 'cancelBtn';
                cancelBtn.className = 'btn btn-outline';
                cancelBtn.innerHTML = '<i class="fas fa-times"></i> Отмена';
                cancelBtn.onclick = resetForm;
                saveBtn.parentNode.appendChild(cancelBtn);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function updateUser() {
            if (!currentUser || !currentUser.canManageUsers) {
                alert('У вас нет прав на управление пользователями');
                return;
            }

            const newUsername = document.getElementById('newUsername').value.trim();
            if (!newUsername) {
                alert('Введите логин');
                return;
            }

            const users = await loadUsers();
            
            if (editingUsername !== newUsername && users[newUsername]) {
                alert('Пользователь с таким логином уже существует');
                return;
            }

            if (editingUsername !== newUsername) {
                delete users[editingUsername];
            }

            users[newUsername] = {
                password: document.getElementById('newPassword').value || 'password',
                role: document.getElementById('newRole').value,
                name: document.getElementById('newName').value || newUsername,
                canCreate: document.getElementById('permCreate').checked,
                canEdit: document.getElementById('permEdit').checked,
                canDelete: document.getElementById('permDelete').checked,
                canManageUsers: document.getElementById('permManageUsers').checked
            };

            const saved = await saveUsers(users);
            if (saved) {
                showMessage('✅ Пользователь обновлён');
                renderUsersTable(users);
                resetForm();
            } else {
                alert('❌ Ошибка сохранения');
            }
        }

        async function deleteUser(username) {
            if (!currentUser || !currentUser.canManageUsers) {
                alert('Нет прав');
                return;
            }

            if (username === currentUser.username) {
                alert('Нельзя удалить самого себя');
                return;
            }

            if (username === 'admin') {
                alert('Нельзя удалить главного администратора');
                return;
            }

            if (confirm(`Удалить пользователя ${username}?`)) {
                const users = await loadUsers();
                delete users[username];
                
                const saved = await saveUsers(users);
                if (saved) {
                    showMessage('✅ Пользователь удален');
                    renderUsersTable(users);
                    if (editingUsername === username) resetForm();
                }
            }
        }

        function resetForm() {
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newRole').value = 'viewer';
            document.getElementById('permCreate').checked = true;
            document.getElementById('permEdit').checked = true;
            document.getElementById('permDelete').checked = true;
            document.getElementById('permManageUsers').checked = false;
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Добавить пользователя';
            saveBtn.onclick = addUser;
            
            const cancelBtn = document.getElementById('cancelBtn');
            if (cancelBtn) cancelBtn.remove();
            
            editingUsername = null;
        }

        function showMessage(text) {
            const msgDiv = document.getElementById('formMessage');
            msgDiv.innerHTML = text;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        function renderUsersTable(users) {
            let html = '';
            
            for (const [username, data] of Object.entries(users)) {
                const rights = [];
                if (data.canCreate) rights.push('➕');
                if (data.canEdit) rights.push('✏️');
                if (data.canDelete) rights.push('🗑️');
                if (data.canManageUsers) rights.push('👥');
                
                html += `<tr>
                    <td><strong>${escapeHtml(username)}</strong></td>
                    <td>${escapeHtml(data.name || username)}</td>
                    <td><span class="badge ${data.role}">${escapeHtml(data.role)}</span></td>
                    <td>${rights.join(' ')}</td>
                    <td class="action-buttons">
                        ${currentUser && currentUser.canManageUsers ? 
                            `<button class="action-btn" onclick="editUser('${username}')">
                                <i class="fas fa-edit"></i> Ред
                            </button>` : ''}
                        ${currentUser && currentUser.canManageUsers && username !== currentUser.username ? 
                            `<button class="action-btn delete" onclick="deleteUser('${username}')">
                                <i class="fas fa-trash"></i> Уд
                            </button>` : ''}
                    </td>
                </tr>`;
            }
            
            document.getElementById('usersTable').innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        
        (async function() {
            githubToken = localStorage.getItem('github_token') || '';
            
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                
                const users = await loadUsers();
                if (users && users[currentUser.username]) {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('currentUserDisplay').innerHTML = `<i class="fas fa-user"></i> ${currentUser.name} (${currentUser.role})`;
                    renderUsersTable(users);
                } else {
                    localStorage.removeItem('currentUser');
                }
            }
        })();
    </script>
</body>
</html>
